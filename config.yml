# ──────────────────────────────────────────────
#  STEP 4 · 经典文章（不限时间，永不重复推送）
# ──────────────────────────────────────────────
classics:
  - title: "The Bitter Lesson"
    url: http://www.incompleteideas.net/IncIdeas/BitterLesson.html
    author: Rich Sutton
    type: essay
    year: 2019
    note: 算力与规模胜过人类先验知识——深度学习成功的底层逻辑

  - title: "Software 2.0"
    url: https://karpathy.medium.com/software-2-0-a64152b37c35
    author: Andrej Karpathy
    type: blog
    year: 2017
    note: AI 重新定义软件开发范式

  - title: "Situational Awareness: The Decade Ahead"
    url: https://situational-awareness.ai
    author: Leopold Aschenbrenner
    type: essay
    year: 2024
    note: 前 OpenAI 研究员对 AGI 时间线和国家竞争的深度分析

  - title: "LLM Powered Autonomous Agents"
    url: https://lilianweng.github.io/posts/2023-06-23-agent/
    author: Lilian Weng
    type: blog
    year: 2023
    note: Agent 系统架构的经典综述：规划、记忆、工具使用

  - title: "Computing Machinery and Intelligence"
    url: https://academic.oup.com/mind/article/LIX/236/433/986238
    author: Alan Turing
    type: essay
    year: 1950
    note: 图灵测试原始论文——AI 领域的思想起点

  - title: "Scaling Laws for Neural Language Models"
    url: https://arxiv.org/abs/2001.08361
    author: Kaplan et al. (OpenAI)
    type: paper
    year: 2020
    note: 奠定 LLM Scaling Law 的经典论文

  - title: "Training language models to follow instructions with human feedback"
    url: https://arxiv.org/abs/2203.02155
    author: Ouyang et al. (OpenAI)
    type: paper
    year: 2022
    note: InstructGPT / RLHF 奠基性工作

  - title: "DeepSeek-V3 Technical Report"
    url: https://arxiv.org/abs/2412.19437
    author: DeepSeek-AI
    type: paper
    year: 2024
    note: MoE 架构、多头潜注意力(MLA)、极低训练成本的超大模型

  - title: "Harness 的思考：Model + Harness = Agent"
    url: https://zhuanlan.zhihu.com/p/1898130003112345600
    author: 崔添翼 (DeepSeek Harness)
    type: blog
    year: 2026
    note: DeepSeek Harness 负责人的核心产品理念


# ──────────────────────────────────────────────
#  STEP 5 · Tavily 搜索（补充 RSS 覆盖不到的动态）
#  每天自动搜索这些关键词，结果汇入日报
# ──────────────────────────────────────────────
tavily_searches:
  # Agent / Harness
  - query: "AI agent harness engineering latest developments 2026"
    topic: "Agent 工程"
  - query: "multi-agent system MCP protocol tool use 2026"
    topic: "Agent 架构"

  # AI for Science
  - query: "AI for Science biology ecology drug discovery breakthrough 2026"
    topic: "AI for Science"

  # 国内厂商
  - query: "DeepSeek 深度求索 最新动态 招聘 2026"
    topic: "DeepSeek"
  - query: "智谱AI 月之暗面 百川智能 面壁智能 最新动态 2026"
    topic: "国内厂商"
  - query: "深势科技 百图生科 AI for Science 最新进展"
    topic: "国内 AI4S"

  # 求职
  - query: "AI agent 产品经理 评测 招聘 2026 北京 杭州"
    topic: "求职机会"

  # KOL 动态
  - query: "崔添翼 DeepSeek Harness agent 2026"
    topic: "KOL 动态"
  - query: "梁文锋 DeepSeek AGI 2026"
    topic: "KOL 动态"


# ──────────────────────────────────────────────
#  STEP 6 · LLM 配置
# ──────────────────────────────────────────────
llm:
  provider: openai_compatible      # aiping.cn 提供 OpenAI 兼容接口
  model: DeepSeek-V4-Pro           # 默认模型
  max_tokens: 8000
  temperature: 0.3
  output_language: 中文             # 日报输出语言


# ──────────────────────────────────────────────
#  STEP 7 · 邮件配置
# ──────────────────────────────────────────────
email:
  smtp_server: smtp.gmail.com
  smtp_port: 465
  # GMAIL_USER 和 GMAIL_APP_PASSWORD 从 ~/.ai-config/.env 读取
  # 如果你用其他邮箱，改这里的 SMTP 配置即可

  # 发送时间（UTC），GitHub Actions 在此时间附近触发
  # 1 UTC = 北京时间早上 9:00
  send_hour_utc: 1


# ──────────────────────────────────────────────
#  STEP 8（可选）· 高级参数
# ──────────────────────────────────────────────
digest:
  news_hours: 24              # 新闻回溯窗口（小时）
  blog_days: 90               # 博客回溯窗口（天）
  news_per_source: 30         # 每个新闻源最多抓取条数
  blog_per_source: 15         # 每个博客最多抓取条数
  tavily_max_results: 5       # 每个 Tavily 搜索返回条数

