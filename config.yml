#
# 核心关注方向：
#   1. Agent / Harness Engineering（崔添翼、DeepSeek Harness、MCP、Multi-Agent）
#   2. AI for Science（生物/生态/药物发现/材料/气象）
#   3. 大模型前沿（LLM、多模态、推理、Infra）
#   4. 国内厂商动态（DeepSeek、智谱、月之暗面、深势科技等）
#   5. 求职机会（产品/评测/Agent 方向）


# ──────────────────────────────────────────────
#  STEP 1 · 关注领域
# ──────────────────────────────────────────────
topics:
  - AI Agent 与 Harness 工程（上下文管理、工具调用、记忆、Multi-Agent、MCP、Subagent）
  - AI for Science（生物学、生态学、药物发现、蛋白质设计、材料科学、气象预测）
  - 大模型前沿（LLM 架构、推理能力、多模态、Post-training、Scaling Law）
  - 国内 AI 厂商动态（DeepSeek、智谱、月之暗面、百川、深势科技、面壁智能）
  - AI 产品与开发者工具（Claude Code、Cursor、Copilot、Agent 产品化）
  - AI 人才市场（招聘趋势、热门岗位、薪资变化）


